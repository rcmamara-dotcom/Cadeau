<!DOCTYPE html>
<html>
<head>
<style>
  body { display:flex; justify-content:center; align-items:center; height:100vh; background:#1a1a2e; flex-direction:column; }
  #box { font-size:80px; cursor:pointer; transition:transform 0.2s; }
  #box:hover { transform:scale(1.1); }
  #glove { font-size:80px; cursor:pointer; display:none; animation:shake 0.3s infinite alternate; }
  #message { font-size:40px; display:none; color:#ff4500; font-family:cursive; text-align:center; font-weight:bold; }
  #explosion { font-size:60px; display:none; }
  @keyframes shake { from{transform:rotate(-10deg)} to{transform:rotate(10deg)} }
</style>
</head>
<body>

<div id="box" onclick="openBox()">🎁</div>
<div id="glove" onclick="explodeGlove()">🥊</div>
<div id="explosion">💥⚡💥⚡💥</div>
<div id="message">😤 T'es un bâtard ! 😤</div>

<script>
function openBox() {
  document.getElementById('box').style.display='none';
  document.getElementById('glove').style.display='block';
}
function explodeGlove() {
  document.getElementById('glove').style.display='none';
  document.getElementById('explosion').style.display='block';
  setTimeout(() => {
    document.getElementById('explosion').style.display='none';
    document.getElementById('message').style.display='block';
  }, 1000);
}
</script>
</body>
</html>
